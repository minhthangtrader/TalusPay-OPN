<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalusPay - Open Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen">

    <div class="bg-gray-800 p-8 rounded-xl shadow-lg w-96 border border-gray-700">
        <h1 class="text-3xl font-bold text-pink-500 mb-2">TalusPay</h1>
        <p class="text-gray-400 mb-6 text-sm">Decentralized Payment on OPN Chain</p>

        <button id="connectBtn" onclick="connectWallet()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded mb-4 transition">
            Connect Wallet
        </button>

        <div class="mb-4">
            <label class="block text-sm font-medium mb-1">Receiver Address</label>
            <input id="receiver" type="text" placeholder="0x..." class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-pink-500">
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium mb-1">Amount (OPN)</label>
            <input id="amount" type="number" placeholder="0.0" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white focus:outline-none focus:border-pink-500">
        </div>

        <button onclick="sendPayment()" class="w-full bg-pink-600 hover:bg-pink-700 text-white font-bold py-3 px-4 rounded transition">
            Send Payment
        </button>

        <p id="status" class="mt-4 text-sm text-center text-green-400"></p>
    </div>

    <script>
        // THAY ĐỊA CHỈ CONTRACT BẠN DEPLOY TRÊN REMIX VÀO ĐÂY:
        const contractAddress = "0x2870953ba98817B30490c86fa808Cb413bEbE83D"; 
        const contractABI = ["function pay(address payable _receiver) external payable"];
        
        let provider, signer, contract;

        async function connectWallet() {
            if (window.ethereum) {
                provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                signer = provider.getSigner();
                contract = new ethers.Contract(contractAddress, contractABI, signer);
                
                const address = await signer.getAddress();
                document.getElementById("connectBtn").innerText = address.slice(0, 6) + "..." + address.slice(-4);
                document.getElementById("connectBtn").classList.replace("bg-blue-600", "bg-green-600");
            } else {
                alert("Please install MetaMask!");
            }
        }

        async function sendPayment() {
            if (!contract) return alert("Please connect wallet first!");
            
            const receiver = document.getElementById("receiver").value;
            const amount = document.getElementById("amount").value;
            const statusEl = document.getElementById("status");

            try {
                statusEl.innerText = "Processing transaction...";
                statusEl.style.color = "yellow";

                const tx = await contract.pay(receiver, {
                    value: ethers.utils.parseEther(amount)
                });

                statusEl.innerText = "Waiting for confirmation...";
                await tx.wait();

                statusEl.innerText = "🎉 Payment Successful! Tx: " + tx.hash.slice(0, 10) + "...";
                statusEl.style.color = "lightgreen";
            } catch (error) {
                console.error(error);
                statusEl.innerText = "Transaction failed!";
                statusEl.style.color = "red";
            }
        }
    </script>
</body>
</html>
